name: Build and deploy ASP.Net Core app to Azure Web App - js-carrental-mvc-jaimin158

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore ./CarRentalApplication.csproj

      - name: Build project
        run: dotnet build ./CarRentalApplication.csproj -c Release --no-restore

      - name: Publish project
        run: dotnet publish ./CarRentalApplication.csproj -c Release -o ./publish --no-build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: mvc-publish
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: mvc-publish
          path: ./publish

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_25AE33830B0F4FEA8742913217B23C8B }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_01E1DC14F3774306A5EA9EAB89CB6E75 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_3D81142F24CD4E3FA82831252C296E2E }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "js-carrental-mvc-jaimin158"
          slot-name: "Production"
          package: ./publish
